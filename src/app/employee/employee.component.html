<div class="d-flex flex-column min-vh-100">

    <!-- HEADER -->
    <div class="bg-dark text-white p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Employee Dashboard</h4>

            <div>
                <button class="btn btn-success me-2" (click)="add()">+ Add</button>
                <button class="btn btn-light" (click)="logout()">Logout</button>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container flex-fill mt-4">

        <!-- TABLE (RESPONSIVE SCROLL) -->
        <div class="card shadow-sm mb-4">
            <div class="card-body table-responsive">

                <table class="table table-bordered table-striped table-sm align-middle">
                    <thead class="table-green">
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Position</th>
                            <th style="min-width:120px;">Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let e of employees">
                            <td>{{e.empName}}</td>
                            <td>{{e.email}}</td>
                            <td>{{e.department?.depName || e.department?.name}}</td>
                            <td>{{e.position?.positionName || e.position?.name}}</td>

                            <td>
                                <button class="btn btn-primary btn-sm me-2" (click)="edit(e)">Edit</button>
                                <button class="btn btn-danger btn-sm" (click)="delete(e.id)">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>

            </div>
        </div>

       

    </div>

    <!-- FOOTER -->
    <div class="bg-light text-center p-2 mt-auto">
        <small>© Employee System</small>
    </div>

</div>


<!-- MODAL -->
<div *ngIf="showModal" class="modal fade show d-block" style="background: rgba(0,0,0,0.5); z-index:1050;">

    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">
                <h5 class="modal-title">
                    {{selected?.id ? 'Edit Employee' : 'Add Employee'}}
                </h5>
                <button class="btn-close" (click)="showModal=false"></button>
            </div>

            <!-- BODY -->
            <div class="modal-body">

                <app-employee-form [employee]="selected" (saved)="onSaved()">
                </app-employee-form>

            </div>

            <!-- FOOTER -->
            <div class="modal-footer">
                <button class="btn btn-secondary" (click)="showModal=false">
                    Cancel
                </button>
            </div>

        </div>
    </div>
</div>
