<div class="container-fluid min-vh-100 d-flex">

    <!-- RIGHT SIDE (FORM) -->
    <div class="col-md-6 d-flex align-items-center justify-content-center">

        <div class="w-100" style="max-width: 380px;">

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">

                    <h4 class="text-center mb-4 fw-bold">Login</h4>

                    <form #f="ngForm" (ngSubmit)="onLogin(f)">

                        <!-- EMAIL -->
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input name="email" ngModel required class="form-control" placeholder="Enter your email">
                        </div>

                        <!-- PASSWORD -->
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" ngModel required class="form-control"
                                placeholder="Enter your password">
                        </div>

                        <!-- BUTTON -->
                        <button class="btn btn-primary w-100 mt-2">
                            Login
                        </button>

                        <!-- ERROR -->
                        <div class="text-danger mt-3 text-center">
                            {{error}}
                        </div>

                    </form>

                </div>
            </div>

        </div>

    </div>

</div>
